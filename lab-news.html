<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab News – Spatial AI Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --navy: #0a1628;
        --accent: #2563eb;
        --accent-light: #60a5fa;
        --white: #ffffff;
        --gray-50: #f8fafc;
        --gray-100: #f1f5f9;
        --gray-200: #e2e8f0;
        --gray-400: #94a3b8;
        --gray-600: #475569;
        --gray-800: #1e293b;
        --text: #0f172a;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: "Sora", sans-serif;
        color: var(--text);
        background: var(--gray-50);
        overflow-x: hidden;
      }

      /* ── NAV ── */
      nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 3rem;
        height: 64px;
        background: rgba(10, 22, 40, 0.97);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      }

      .nav-logo {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        text-decoration: none;
      }

      .nav-logo-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, var(--accent), var(--accent-light));
        border-radius: 8px;
        display: grid;
        place-items: center;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.7rem;
        font-weight: 500;
        color: #fff;
      }

      .nav-logo span {
        font-size: 0.85rem;
        font-weight: 600;
        color: #fff;
      }

      .nav-links {
        display: flex;
        gap: 2rem;
        list-style: none;
      }

      .nav-links a {
        color: rgba(255, 255, 255, 0.7);
        text-decoration: none;
        font-size: 0.82rem;
        font-weight: 500;
        letter-spacing: 0.04em;
        transition: color 0.2s;
      }

      .nav-links a:hover {
        color: #fff;
      }
      .nav-links a.active {
        color: #fff;
        border-bottom: 2px solid var(--accent-light);
        padding-bottom: 2px;
      }

      .hamburger {
        display: none;
        flex-direction: column;
        gap: 5px;
        cursor: pointer;
        background: none;
        border: none;
      }
      .hamburger span {
        display: block;
        width: 24px;
        height: 2px;
        background: #fff;
      }

      /* ── PAGE HEADER ── */
      .page-header {
        margin-top: 64px;
        background: var(--navy);
        padding: 4rem 0 3rem;
        position: relative;
        overflow: hidden;
      }

      .page-header::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            ellipse 60% 80% at 70% 50%,
            rgba(37, 99, 235, 0.22) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 40% 60% at 10% 80%,
            rgba(96, 165, 250, 0.1) 0%,
            transparent 60%
          );
      }

      .page-header::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
      }

      .page-header .inner {
        position: relative;
        z-index: 1;
        max-width: 1140px;
        margin: 0 auto;
        padding: 0 2rem;
      }

      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.4);
        margin-bottom: 0.75rem;
        font-family: "JetBrains Mono", monospace;
      }

      .breadcrumb a {
        color: rgba(255, 255, 255, 0.4);
        text-decoration: none;
        transition: color 0.2s;
      }
      .breadcrumb a:hover {
        color: rgba(255, 255, 255, 0.7);
      }
      .breadcrumb sep {
        color: rgba(255, 255, 255, 0.2);
      }

      .page-header h1 {
        font-family: "DM Serif Display", serif;
        font-size: clamp(2rem, 4vw, 3rem);
        color: #fff;
        margin-bottom: 0.5rem;
      }

      .page-header p {
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.9rem;
        font-weight: 300;
      }

      /* ── MAIN ── */
      .main {
        max-width: 1140px;
        margin: 0 auto;
        padding: 3rem 2rem 5rem;
      }

      /* ── CARD GRID ── */
      .news-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.75rem;
      }

      /* ── NEWS CARD ── */
      .news-card {
        background: var(--white);
        border-radius: 16px;
        border: 1px solid var(--gray-200);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition:
          box-shadow 0.3s,
          transform 0.3s;
      }

      .news-card:hover {
        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.09);
        transform: translateY(-4px);
      }

      /* image / placeholder */
      .card-img {
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        display: block;
      }

      .card-img-placeholder {
        width: 100%;
        aspect-ratio: 16 / 9;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.8rem;
        flex-shrink: 0;
      }

      /* card body */
      .card-body {
        padding: 1.25rem 1.25rem 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        flex: 1;
      }

      .card-date {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.7rem;
        font-weight: 500;
        color: var(--gray-400);
        letter-spacing: 0.05em;
      }

      .card-text {
        font-size: 0.88rem;
        color: var(--gray-800);
        line-height: 1.65;
        flex: 1;
      }

      .card-text strong {
        color: var(--navy);
        font-weight: 600;
      }

      .card-text a {
        color: var(--accent);
        text-decoration: none;
        border-bottom: 1px solid rgba(37, 99, 235, 0.25);
        transition: border-color 0.2s;
      }
      .card-text a:hover {
        border-color: var(--accent);
      }

      /* ── FOOTER ── */
      footer {
        background: var(--navy);
        padding: 2rem;
        text-align: center;
        font-size: 0.78rem;
        color: rgba(255, 255, 255, 0.35);
      }

      /* ── MOBILE ── */
      @media (max-width: 1024px) {
        .news-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 900px) {
        nav {
          padding: 0 1.5rem;
        }
        .nav-links {
          display: none;
        }
        .nav-links.open {
          display: flex;
          flex-direction: column;
          position: fixed;
          top: 64px;
          left: 0;
          right: 0;
          background: var(--navy);
          padding: 1.5rem 2rem;
          border-top: 1px solid rgba(255, 255, 255, 0.08);
          gap: 1.25rem;
        }
        .hamburger {
          display: flex;
        }
      }

      @media (max-width: 560px) {
        .news-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <!-- NAV -->
    <nav>
      <a href="../index.html" class="nav-logo">
        <img
          src="./assets/logo+name.png"
          alt="SmartFactoryLab Logo"
          class="logo-img"
          style="height: 40px; width: auto; display: block; object-fit: contain"
        />
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html#">Home</a></li>
        <li><a href="index.html#research">Research Area</a></li>
        <li><a href="./members/index.html">Members</a></li>
        <li><a href="./publications/index.html">Publications</a></li>
        <li><a href="./lab-news.html">Lab News</a></li>
        <li><a href="index.html#join">Join Us</a></li>
      </ul>
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </nav>

    <!-- PAGE HEADER -->
    <div class="page-header">
      <div class="inner">
        <div class="breadcrumb">
          <a href="index.html">Home</a>
          <sep>/</sep>
          <span>News</span>
        </div>
        <h1>Lab News✌️</h1>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main">
      <div class="news-grid">
        <div class="news-card">
          <div
            class="card-img-placeholder"
            style="background: linear-gradient(135deg, #1e3a6b, #1d4ed8)"
          >
            🚀
          </div>
          <div class="card-body">
            <p class="card-date">Mar 26, 2026</p>
            <p class="card-text">Comming Soon!</p>
          </div>
        </div>
      </div>
    </div>

    <footer>
      © 2026 SmartFactoryLab · Kyunghee University · All rights reserved.
    </footer>

    <script>
      document.getElementById("hamburger").addEventListener("click", () => {
        document.getElementById("navLinks").classList.toggle("open");
      });
    </script>
  </body>
</html>
